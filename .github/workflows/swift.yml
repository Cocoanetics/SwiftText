---
name: Swift
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel earlier runs of this workflow on the same branch as soon as a new
# commit comes in — Windows in particular is slow (vcpkg install + cmark
# build are not cheap on a cold runner) and stacking runs wastes capacity.
concurrency:
  group: swift-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Verify Swift version
        run: swift --version
      - name: Build & Test (macOS)
        run: swift test -v

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: swift:6.3-jammy
    steps:
      - uses: actions/checkout@v6
      - name: Install libxml2 dev
        run: apt-get update && apt-get install -y libxml2-dev pkg-config
      - name: Verify Swift version
        run: swift --version
      - name: Build & Test (Linux)
        run: swift test -v

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode 26.0
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"
      - name: Verify Swift version
        run: swift --version
      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -scheme SwiftText-Package \
            -destination "generic/platform=iOS Simulator" \
            -skipPackagePluginValidation
      - name: Test on iOS Simulator
        run: |
          xcodebuild test \
            -scheme SwiftText-Package \
            -destination "platform=iOS Simulator,name=iPhone 17,OS=latest" \
            -skipPackagePluginValidation

  # Windows job — runs the portable unit tests (Foundation + swift-markdown only).
  # SWIFTTEXT_PORTABLE_ONLY trims the package to the pure-Swift targets, so the
  # libxml2-backed SwiftTextHTML/SwiftTextRender and the ZIPFoundation-backed
  # DOCX/Pages targets are absent from the graph — `swift test` builds and runs
  # only what the Windows toolchain can satisfy with no vcpkg/libxml2 needed.
  # Production toolchain is Swift 6.3.1 via SwiftyLab/setup-swift.
  test-windows-portable:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      SWIFTTEXT_PORTABLE_ONLY: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Setup Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.1"
      - name: Verify Swift version
        run: swift --version
      - name: Build & Test (portable targets)
        run: swift test -v

  # Android job — runs the portable unit tests on an x86_64 emulator via
  # skiptools/swift-android-action, which provisions the Swift Android SDK.
  # SWIFTTEXT_PORTABLE_ONLY trims the package to the pure-Swift targets (no
  # libxml2/ZIPFoundation, which the Android SDK doesn't provide), so the action
  # can build the test bundle and actually run it under the emulator — proving
  # the Markdown/AttributedString/CSS/OpenType/PDF-writer core works on bionic.
  test-android-portable:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SWIFTTEXT_PORTABLE_ONLY: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Build & Test (Android cross-compile, portable targets)
        uses: skiptools/swift-android-action@v2
        with:
          swift-version: "6.3"
          # Default GitHub Linux runner has ~14 GiB free; SDK + NDK + emulator
          # together push past that without cleanup.
          free-disk-space: true
          # Build the test bundle and run it on the emulator. With the portable
          # subset there's no libxml2/ZIPFoundation for the SDK to choke on.
          run-tests: true
